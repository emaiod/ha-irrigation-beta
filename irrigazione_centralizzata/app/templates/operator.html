<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Portale Irrigazione</title><style>
:root{font-family:system-ui,-apple-system,sans-serif;--bg:#eef4f5;--card:#fff;--text:#172126;--muted:#68777e;--line:#d7e1e4;--accent:#168aad;--danger:#c0392b;--warning:#ef6c00}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text)}header{padding:18px 20px;background:var(--card);border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}header h1{font-size:1.25rem;margin:0}main{max-width:900px;margin:auto;padding:18px}.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:14px}.login{max-width:420px;margin:8vh auto}.login form{display:grid;gap:12px}label{display:grid;gap:5px;font-weight:650}input{padding:12px;border:1px solid var(--line);border-radius:9px;font-size:1rem}button{border:0;border-radius:9px;padding:11px 15px;background:var(--accent);color:#fff;font-weight:750;cursor:pointer}.danger{background:var(--danger)}.warning{background:var(--warning)}.secondary{background:#607d8b}.status{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.status small{display:block;color:var(--muted)}.status strong{font-size:1.1rem}.programs{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px}.program h3{margin-top:0}.steps{display:grid;gap:8px}.step{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;padding:11px;border:1px solid var(--line);border-radius:10px}.step.running{border-color:var(--accent)}.step small{display:block;color:var(--muted)}.actions{display:flex;gap:8px;flex-wrap:wrap}.error{color:var(--danger);font-weight:700}.muted{color:var(--muted)}@media(max-width:650px){.status{grid-template-columns:1fr}.step{grid-template-columns:auto 1fr}.step button{grid-column:2;width:100%}}</style></head><body>
{% if not user %}<main><div class="card login"><h1>💧 Portale irrigazione</h1><p class="muted">Accesso riservato agli operatori autorizzati.</p><div id="loginError" class="error"></div><form method="post" action="/operator/login"><label>Nome utente<input name="username" autocomplete="username" required></label><label>Password<input type="password" name="password" autocomplete="current-password" required></label><button>Accedi</button></form></div></main><script>if(new URLSearchParams(location.search).has('error'))document.getElementById('loginError').textContent='Credenziali non valide o utente disattivato.';</script>
{% else %}<header><div><h1>💧 Irrigazione</h1><small>{{ user.display_name }}</small></div><form method="post" action="/operator/logout"><button class="secondary">Esci</button></form></header><main><div class="card status"><div><small>Programma</small><strong id="program">Nessuno</strong></div><div><small>Zona attiva</small><strong id="zone">—</strong></div><div><small>Tempo rimanente</small><strong id="remaining">00:00</strong></div></div><div id="runtime" class="card" hidden><h2 id="runtimeTitle">Programma in corso</h2><div id="steps" class="steps"></div><div class="actions" style="margin-top:12px"><button class="danger" onclick="stopAll()">Arresta tutto</button></div></div><h2>Programmi disponibili</h2><div id="programs" class="programs"></div></main><script>
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));async function api(path,opts={}){const r=await fetch('/operator/api/'+path,{headers:{'Content-Type':'application/json'},...opts});if(r.status===401){location.reload();throw new Error('Sessione scaduta')}if(!r.ok)throw new Error(await r.text());return r.json()}
async function loadPrograms(){const ps=await api('programs');document.getElementById('programs').innerHTML=ps.map(p=>`<div class="card program"><h3>${esc(p.name)}</h3><p>${p.steps.map(s=>`${esc(s.zone_name)} · ${s.duration_minutes} min`).join('<br>')}</p><button onclick="startProgram(${p.id},'${esc(p.name)}')">Avvia</button></div>`).join('')||'<p>Nessun programma configurato.</p>'}async function startProgram(id,name){if(!confirm(`Avviare ${name}?`))return;try{await api(`programs/${id}/start`,{method:'POST'})}catch(e){alert(e.message)}}async function stopAll(){if(confirm('Arrestare completamente il programma?'))await api('stop',{method:'POST'})}async function skip(i,name){if(confirm(`Saltare la zona ${name}?`))await api(`skip-zone/${i}`,{method:'POST'})}
async function loadState(){try{const s=await api('state');document.getElementById('program').textContent=s.program_name||'Nessuno';document.getElementById('zone').textContent=s.zone_name||'—';const m=Math.floor((s.remaining_seconds||0)/60),sec=(s.remaining_seconds||0)%60;document.getElementById('remaining').textContent=`${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;document.getElementById('runtime').hidden=!s.running;if(s.running){document.getElementById('runtimeTitle').textContent=s.program_name;document.getElementById('steps').innerHTML=(s.steps||[]).map((x,i)=>`<div class="step ${esc(x.status)}"><strong>${i+1}</strong><div><b>${esc(x.zone_name)}</b><small>${x.duration_minutes} min · ${esc(x.status)}</small></div>${['running','pending'].includes(x.status)?`<button class="warning" onclick="skip(${i},'${esc(x.zone_name)}')">Salta</button>`:''}</div>`).join('')}}catch(e){console.error(e)}}loadPrograms();loadState();setInterval(loadState,2000);
</script>{% endif %}</body></html>
